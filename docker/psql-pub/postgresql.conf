# ============================================================
# PostgreSQL Configuration — Dev (Rails / Docker) + Replication required
# ============================================================
# 目的:
# - Rails 開発/テストの安定運用
# - 物理レプリケーション (slot) 前提で確実に起動
# - auto_explain で遅いSQLの原因調査を即ログ化
# ============================================================


# ============================================================
# Connections / Network
# ============================================================
listen_addresses = '*'
# 32 parallel test threads × 19 databases (pool=32 each) = up to 608 connections,
# plus replication senders and superuser slots.
max_connections = 700
# Keep admin/superuser slots available even when regular connections are exhausted.
superuser_reserved_connections = 10
# Kill stale sessions that sit inside a transaction and hold resources/locks.
idle_in_transaction_session_timeout = 60s


# ============================================================
# Replication (REQUIRED)
# ============================================================
wal_level = replica
hot_standby = on

# init.sh が replication slot を作る前提
max_wal_senders = 10
max_replication_slots = 10

# standby 側のクエリが master の vacuum を邪魔しやすいが、
# dev で "見え方" を優先するなら on もあり（必要なら off に）
hot_standby_feedback = on


# ============================================================
# Durability (dev)
# ============================================================
# dev/test 環境ではデータ永続性より速度を優先。
# WAL 生成自体は wal_level=replica で維持されるため replication には影響しない。
# WARNING: これらは開発/テスト専用の設定です。本番環境では絶対に使用しないこと。
# fsync=off などは PostgreSQL クラッシュ時にデータ破損を引き起こします。
fsync = off
synchronous_commit = off
full_page_writes = off


# ============================================================
# WAL / Checkpoint
# ============================================================
# 体感のスパイクを減らす（ただし replication との整合性は維持）
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
min_wal_size = 1GB
max_wal_size = 4GB
wal_compression = on
wal_buffers = 16MB


# ============================================================
# Memory
# ============================================================
shared_buffers = 512MB
effective_cache_size = 2GB
# Keep maintenance tasks reasonably fast in dev without excessive memory spikes.
maintenance_work_mem = 128MB
# Conservative per-operation memory so total usage stays predictable at high concurrency.
work_mem = 8MB
huge_pages = try


# ============================================================
# Parallelism
# ============================================================
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_workers_per_gather = 2


# ============================================================
# Lock / Hang visibility
# ============================================================
deadlock_timeout = 1s
log_lock_waits = on
lock_timeout = 0


# ============================================================
# Logging (Docker-friendly)
# ============================================================
log_destination = 'stderr'
logging_collector = off

log_statement = 'none'
log_duration = off
log_min_duration_statement = -1


# ============================================================
# Autovacuum
# ============================================================
autovacuum_max_workers = 2
autovacuum_naptime = 60s


# ============================================================
# Planner tuning (SSD/NVMe)
# ============================================================
default_statistics_target = 100
random_page_cost = 1.1
effective_io_concurrency = 200


# ============================================================
# auto_explain — Slow Query Investigation (DEV)
# ============================================================
# 起動時ロード必須（reload不可）
# 既に他の preload がある場合は併記すること
shared_preload_libraries = 'pg_stat_statements,auto_explain'

auto_explain.log_min_duration = '200ms'
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_nested_statements = on

auto_explain.log_format = json
auto_explain.log_timing = on
auto_explain.log_verbose = on

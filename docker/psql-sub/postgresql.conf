listen_addresses = '*'
# 32 parallel test threads × 18 replica databases (pool=32 each) = up to 576 connections,
# plus superuser slots.
max_connections = 700
# Keep admin/superuser slots available even when regular connections are exhausted.
superuser_reserved_connections = 10
# Kill stale sessions that sit inside a transaction and hold resources/locks.
idle_in_transaction_session_timeout = 60s
max_worker_processes = 16
max_parallel_workers_per_gather = 4

# Replication
wal_level = replica
hot_standby = on
max_wal_senders = 10
max_replication_slots = 10
hot_standby_feedback = on

# Test Performance Optimization for Replica
# WARNING: These settings sacrifice durability for speed
# Only use in development/test environments!
checkpoint_timeout = 15min
max_wal_size = 4GB
checkpoint_completion_target = 0.9
wal_compression = on
fsync = off
synchronous_commit = off
full_page_writes = off

# Memory settings for better performance
shared_buffers = 256MB
effective_cache_size = 1GB
# Keep maintenance tasks reasonably fast in dev without excessive memory spikes.
maintenance_work_mem = 128MB
# Conservative per-operation memory so total usage stays predictable at high concurrency.
work_mem = 8MB
